services:
  ContainerA:
    build:
      context: "."
      dockerfile: "Dockerfile"
    image: "containera"
    working_dir: "/app"
    command: ["python", "runtime_runner.py", "--config", "/app/config.json", "--container", "ContainerA"]
    cpus: 0.5
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
    volumes:
      - "./:/app"
    ports:
      - "8443:8443"
      - "8444:8444"
      - "8445:8445"
      - "8446:8446"
      - "8447:8447"
      - "8448:8448"
      - "8449:8449"
      - "8450:8450"
      - "8451:8451"
      - "8452:8452"
      - "8453:8453"
      - "8454:8454"
    networks:
      - "simulation"
    restart: "unless-stopped"
networks:
  simulation:
    driver: bridge
